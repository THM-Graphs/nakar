openapi: 3.0.0
info:
  title: NAKAR
  version: 1.0.0

servers:
  - url: http://localhost:1338
    description: Development
  - url: http://nakar.mni.thm.de:1338
    description: Production

tags:
  - name: Authentication
  - name: Start Page
  - name: Project Page
  - name: Canvas Page
  - name: Notes
  - name: Room
  - name: Canvas
  - name: Graph
  - name: Actions
  - name: System
  - name: Database

paths:
  /auth:
    post:
      tags:
        - Authentication
      operationId: postAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  jwt:
                    type: string
                  username:
                    type: string
                required:
                  - jwt
                  - username
    get:
      tags:
        - Authentication
      operationId: getAuth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                required:
                  - username

  /start-page:
    get:
      tags:
        - Start Page
      operationId: getStartPage
      parameters:
        - in: query
          name: recentRoomIds
          schema:
            type: array
            items:
              type: string
          required: true
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StartPage"

  /project-page/{id}:
    get:
      tags:
        - Project Page
      operationId: getProjectPage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPage"

  /canvas-page/{id}:
    get:
      tags:
        - Canvas Page
      operationId: getCanvasPage
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CanvasPage"

  /canvas/{id}:
    put:
      tags:
        - Canvas
      operationId: setCanvasData
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Canvas"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                viewSettings:
                  $ref: "#/components/schemas/CanvasViewSettings"
              required:
                - viewSettings

  /room/{id}:
    get:
      tags:
        - Room
      operationId: getRoom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /room/{id}/scenarios:
    get:
      tags:
        - Room
      operationId: getRoomScenarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScenariosResult"

  /note:
    post:
      tags:
        - Notes
      operationId: postNote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodeIds:
                  type: array
                  items:
                    type: string
                content:
                  type: string
                canvasId:
                  type: string
              required:
                - nodeIds
                - content
                - canvasId
      responses:
        "200":
          description: "OK"

  /note/{id}:
    delete:
      tags:
        - Notes
      operationId: deleteNote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
    put:
      tags:
        - Notes
      operationId: putNote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
              required:
                - content
      responses:
        "200":
          description: "OK"

  /canvas/{id}/graph:
    get:
      tags:
        - Graph
      operationId: getGraph
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Graph"

  /canvas/{id}/actions/load-scenario:
    post:
      tags:
        - Actions
      operationId: postCanvasActionLoadScenario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scenarioId:
                  type: string
                additive:
                  type: boolean
                arguments:
                  type: array
                  items:
                    $ref: "#/components/schemas/ScenarioArgument"
              required:
                - scenarioId
                - arguments
                - additive
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/reload-scenario:
    post:
      tags:
        - Actions
      operationId: postCanvasActionReloadScenario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/expand-node:
    post:
      tags:
        - Actions
      operationId: postCanvasActionExpandNode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodeId:
                  type: string
                limit:
                  type: object
                  nullable: true
                  properties:
                    labels:
                      type: array
                      items:
                        type: string
                    relationships:
                      type: array
                      items:
                        type: string
                  required:
                    - labels
                    - relationships
              required:
                - nodeId
                - limit
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/expand-node-preview:
    post:
      tags:
        - Actions
      operationId: postCanvasActionExpandNodePreview
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodeId:
                  type: string
              required:
                - nodeId
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                nullable: true
                properties:
                  relationships:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExpandNodePreviewElement"
                  labels:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExpandNodePreviewElement"
                required:
                  - relationships
                  - labels

  /canvas/{id}/actions/delete-elements:
    post:
      tags:
        - Actions
      operationId: postCanvasActionDeleteElements
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodes:
                  type: array
                  items:
                    type: string
                edges:
                  type: array
                  items:
                    type: string
                labels:
                  type: array
                  items:
                    type: string
                edgeTypes:
                  type: array
                  items:
                    type: string
              required:
                - nodes
                - edges
                - labels
                - edgeTypes
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/relayout:
    post:
      tags:
        - Actions
      operationId: postCanvasActionRelayout
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/unlock-nodes:
    post:
      tags:
        - Actions
      operationId: postCanvasActionUnlockNodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodes:
                  type: array
                  items:
                    type: string
              required:
                - nodes
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/focus-nodes:
    post:
      tags:
        - Actions
      operationId: postCanvasActionFocusNodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodes:
                  type: array
                  items:
                    type: string
              required:
                - nodes
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/undo:
    post:
      tags:
        - Actions
      operationId: postCanvasActionUndo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/redo:
    post:
      tags:
        - Actions
      operationId: postCanvasActionRedo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/run-query:
    post:
      tags:
        - Actions
      operationId: postCanvasActionRunQuery
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                databaseId:
                  type: string
                query:
                  type: string
                replace:
                  type: boolean
              required:
                - databaseId
                - query
                - replace
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/connect-result-nodes:
    post:
      tags:
        - Actions
      operationId: postCanvasActionConnectResultNodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/unlock-all-nodes:
    post:
      tags:
        - Actions
      operationId: postCanvasActionUnlockAllNodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/remove-dangling-nodes:
    post:
      tags:
        - Actions
      operationId: postCanvasActionRemoveDanglingNodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/compress-relationships:
    post:
      tags:
        - Actions
      operationId: postCanvasActionCompressRelationships
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/compress-nodes:
    post:
      tags:
        - Actions
      operationId: postCanvasActionCompressNodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
              required:
                - label
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/layout-label:
    post:
      tags:
        - Actions
      operationId: postCanvasActionLayoutLabel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                layoutSpecification:
                  $ref: "#/components/schemas/LayoutSpecification"
              required:
                - label
                - layoutSpecification
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/show-shortest-path:
    post:
      tags:
        - Actions
      operationId: postCanvasActionShowShortestPath
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodeIds:
                  type: array
                  items:
                    type: string
              required:
                - nodeIds
      responses:
        "200":
          description: "OK"

  /canvas/{id}/actions/load-node:
    post:
      tags:
        - Actions
      operationId: postCanvasActionLoadNode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodeId:
                  type: string
                databaseId:
                  type: string
              required:
                - nodeId
                - databaseId
      responses:
        "200":
          description: "OK"

  /database/{id}/stats:
    get:
      tags:
        - Database
      operationId: getDatabaseStats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseStats"

  /database/{id}/search:
    post:
      tags:
        - Database
      operationId: postDatabaseSearch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                searchTerm:
                  type: string
                roomId:
                  type: string
              required:
                - searchTerm
                - roomId
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  nodes:
                    type: array
                    items:
                      $ref: "#/components/schemas/NodePreview"
                required:
                  - nodes

  /database/{id}/search-capabilities:
    get:
      tags:
        - Database
      operationId: getDatabaseSearchCapabilities
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseSearchCapabilities"

  /system/version:
    get:
      tags:
        - System
      operationId: getVersion
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    GetScenariosResult:
      type: object
      properties:
        scenarioGroups:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioGroup"
        parameterizedScenarios:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioGroup"
        referencedDatabases:
          type: array
          items:
            $ref: "#/components/schemas/DatabaseConnection"
      required:
        - scenarioGroups
        - parameterizedScenarios
        - referencedDatabases

    PresetColorIndex:
      type: integer
      enum: [0, 1, 2, 3, 4, 5]

    PresetColor:
      type: object
      properties:
        type:
          type: string
          enum: ["PresetColor"]
        index:
          $ref: "#/components/schemas/PresetColorIndex"
      required:
        - index
        - type

    CustomColor:
      type: object
      properties:
        type:
          type: string
          enum: ["CustomColor"]
        backgroundColor:
          type: string
        textColor:
          type: string
      required:
        - type
        - backgroundColor
        - textColor

    Color:
      oneOf:
        - $ref: "#/components/schemas/PresetColor"
        - $ref: "#/components/schemas/CustomColor"

    GraphLabel:
      type: object
      properties:
        label:
          type: string
        color:
          $ref: "#/components/schemas/Color"
        count:
          type: integer
        sources:
          type: array
          items:
            type: string
      required:
        - label
        - color
        - count
        - sources

    GraphProperty:
      type: object
      properties:
        slug:
          type: string
        value:
          $ref: "#/components/schemas/GraphPropertyValue"
      required:
        - slug
        - value
    GraphPropertyValue: {}

    CreationReason:
      type: string
      enum:
        [
          "loadScenario",
          "expand",
          "query",
          "merge",
          "compress",
          "connectResultNodes",
          "search",
        ]

    Node:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        labels:
          type: array
          items:
            type: string
        nativeLabels:
          type: array
          items:
            type: string
        properties:
          type: array
          items:
            $ref: "#/components/schemas/GraphProperty"
        radius:
          type: number
        position:
          $ref: "#/components/schemas/Position"
        inDegree:
          type: integer
        outDegree:
          type: integer
        degree:
          type: integer
        namesInQuery:
          type: array
          items:
            type: string
        customColor:
          type: object
          nullable: true
          properties:
            color:
              $ref: "#/components/schemas/Color"
          required:
            - color
        customTitleColor:
          type: string
          nullable: true
        source:
          type: string
        locked:
          type: boolean
        isCluster:
          type: boolean
        clusterSize:
          type: integer
        incomingEdges:
          type: array
          items:
            $ref: "#/components/schemas/EdgePreview"
        outgoingEdges:
          type: array
          items:
            $ref: "#/components/schemas/EdgePreview"
        creationReason:
          $ref: "#/components/schemas/CreationReason"
        notes:
          type: array
          items:
            $ref: "#/components/schemas/Note"
      required:
        - id
        - title
        - labels
        - nativeLabels
        - properties
        - radius
        - position
        - inDegree
        - outDegree
        - degree
        - namesInQuery
        - customColor
        - source
        - locked
        - isCluster
        - clusterSize
        - incomingEdges
        - outgoingEdges
        - creationReason
        - notes

    PhysicalNode:
      type: object
      properties:
        id:
          type: string
        position:
          $ref: "#/components/schemas/Position"
      required:
        - id
        - position

    Position:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
      required:
        - x
        - y

    Edge:
      type: object
      properties:
        id:
          type: string
        startNodeId:
          type: string
        endNodeId:
          type: string
        type:
          type: string
        isLoop:
          type: boolean
        parallelCount:
          type: integer
        parallelIndex:
          type: integer
        isCluster:
          type: boolean
        width:
          type: number
        properties:
          type: array
          items:
            $ref: "#/components/schemas/GraphProperty"
        namesInQuery:
          type: array
          items:
            type: string
        source:
          type: string
        clusterSize:
          type: integer
        sourceNode:
          $ref: "#/components/schemas/NodePreview"
        targetNode:
          $ref: "#/components/schemas/NodePreview"
        creationReason:
          $ref: "#/components/schemas/CreationReason"
      required:
        - id
        - startNodeId
        - endNodeId
        - type
        - properties
        - isLoop
        - parallelCount
        - parallelIndex
        - isCluster
        - width
        - namesInQuery
        - source
        - clusterSize
        - sourceNode
        - targetNode
        - creationReason

    NodePreview:
      properties:
        id:
          type: string
        title:
          type: string
        labels:
          type: array
          items:
            type: string
        customColor:
          type: object
          nullable: true
          properties:
            color:
              $ref: "#/components/schemas/Color"
          required:
            - color
      required:
        - id
        - title
        - labels
        - customColor

    EdgePreview:
      properties:
        type:
          type: string
        count:
          type: number
        percentage:
          type: number
      required:
        - type
        - count
        - percentage

    Histogram:
      type: object
      properties:
        nodeLabels:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              count:
                type: number
              percentage:
                type: number
            required:
              - label
              - count
              - percentage
        nodeProperties:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              values:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: string
                    count:
                      type: number
                    percentage:
                      type: number
                  required:
                    - value
                    - count
                    - percentage
            required:
              - key
              - values
        edgeTypes:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              count:
                type: number
              percentage:
                type: number
            required:
              - type
              - count
              - percentage
        edgeProperties:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              values:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: string
                    count:
                      type: number
                    percentage:
                      type: number
                  required:
                    - value
                    - count
                    - percentage
            required:
              - key
              - values
        nodes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              labels:
                type: array
                items:
                  type: string
              degree:
                type: number
              percentage:
                type: number
              customColor:
                type: object
                nullable: true
                properties:
                  color:
                    $ref: "#/components/schemas/Color"
                required:
                  - color
            required:
              - id
              - title
              - labels
              - degree
              - percentage
              - customColor
      required:
        - nodeLabels
        - nodeProperties
        - edgeTypes
        - edgeProperties
        - nodes

    GraphMetaData:
      type: object
      properties:
        scenario:
          type: object
          nullable: true
          properties:
            current:
              $ref: "#/components/schemas/Scenario"
          required:
            - current
        arguments:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioArgument"
        undoAction:
          type: string
          nullable: true
        redoAction:
          type: string
          nullable: true
      required:
        - scenarioInfo
        - arguments
        - undoAction
        - redoAction

    GraphElements:
      type: object
      properties:
        nodes:
          type: array
          items:
