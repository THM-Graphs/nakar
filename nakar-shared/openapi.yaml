openapi: 3.0.0
info:
  title: NAKAR
  version: 1.0.0
servers:
  - url: http://localhost:1338
    description: Development
  - url: http://nakar.mni.thm.de:1338
    description: Production
tags:
  - name: Scenarios
  - name: Room
  - name: System
paths:
  /scenarios:
    get:
      tags:
        - Scenarios
      operationId: getScenarios
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Databases"

  /room:
    get:
      tags:
        - Room
      operationId: getRooms
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rooms"
  /room/{id}:
    get:
      tags:
        - Room
      operationId: getRoom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /room/{id}/graph:
    get:
      tags:
        - Room
      operationId: getRoomGraph
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Graph"

  /system/version:
    get:
      tags:
        - System
      operationId: getVersion
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"

components:
  schemas:
    PresetColorIndex:
      type: integer
      enum: [0, 1, 2, 3, 4, 5]

    PresetColor:
      type: object
      properties:
        index:
          $ref: "#/components/schemas/PresetColorIndex"
      required:
        - index

    CustomColor:
      type: object
      properties:
        backgroundColor:
          type: string
        textColor:
          type: string
      required:
        - backgroundColor
        - textColor

    Color:
      discriminator:
        propertyName: type
      oneOf:
        - $ref: "#/components/schemas/PresetColor"
        - $ref: "#/components/schemas/CustomColor"

    GraphLabel:
      type: object
      properties:
        label:
          type: string
        color:
          $ref: "#/components/schemas/Color"
        count:
          type: integer
        sources:
          type: array
          items:
            type: string
      required:
        - label
        - color
        - count
        - sources

    GraphProperty:
      type: object
      properties:
        slug:
          type: string
        value:
          $ref: "#/components/schemas/GraphPropertyValue"
      required:
        - slug
        - value
    GraphPropertyValue: {}

    Node:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        labels:
          type: array
          items:
            type: string
        properties:
          type: array
          items:
            $ref: "#/components/schemas/GraphProperty"
        radius:
          type: number
        position:
          $ref: "#/components/schemas/Position"
        inDegree:
          type: integer
        outDegree:
          type: integer
        degree:
          type: integer
        namesInQuery:
          type: array
          items:
            type: string
        displayConfigurationContext: {}
        customBackgroundColor:
          type: string
          nullable: true
        customTitleColor:
          type: string
          nullable: true
        source:
          type: string
        additionalSources:
          type: array
          items:
            type: string
        locked:
          type: boolean
      required:
        - id
        - title
        - labels
        - properties
        - radius
        - position
        - inDegree
        - outDegree
        - degree
        - namesInQuery
        - displayConfigurationContext
        - customBackgroundColor
        - customTitleColor
        - source
        - additionalSources
        - locked

    PhysicalNode:
      type: object
      properties:
        id:
          type: string
        position:
          $ref: "#/components/schemas/Position"
      required:
        - id
        - position

    Position:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
      required:
        - x
        - y

    Edge:
      type: object
      properties:
        id:
          type: string
        startNodeId:
          type: string
        endNodeId:
          type: string
        type:
          type: string
        isLoop:
          type: boolean
        parallelCount:
          type: integer
        parallelIndex:
          type: integer
        compressedCount:
          type: integer
        width:
          type: number
        properties:
          type: array
          items:
            $ref: "#/components/schemas/GraphProperty"
        namesInQuery:
          type: array
          items:
            type: string
        source:
          type: string
      required:
        - id
        - startNodeId
        - endNodeId
        - type
        - properties
        - isLoop
        - parallelCount
        - parallelIndex
        - compressedCount
        - width
        - namesInQuery
        - source

    ScenarioInfo:
      type: object
      nullable: true
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
      required:
        - id
        - title

    Histogram:
      type: object
      properties:
        nodeLabels:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              count:
                type: number
              percentage:
                type: number
            required:
              - label
              - count
              - percentage
        nodeProperties:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              values:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: string
                    count:
                      type: number
                    percentage:
                      type: number
                  required:
                    - value
                    - count
                    - percentage
            required:
              - key
              - values
        edgeTypes:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              count:
                type: number
              percentage:
                type: number
            required:
              - type
              - count
              - percentage
        edgeProperties:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              values:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: string
                    count:
                      type: number
                    percentage:
                      type: number
                  required:
                    - value
                    - count
                    - percentage
            required:
              - key
              - values
      required:
        - nodeLabels
        - nodeProperties
        - edgeTypes
        - edgeProperties

    GraphMetaData:
      type: object
      properties:
        scenarioInfo:
          $ref: "#/components/schemas/ScenarioInfo"
        pipelineSummary:
          type: array
          items:
            type: object
            properties:
              step:
                type: string
              durationMs:
                type: number
            required:
              - step
              - durationMs
        histogram:
          $ref: "#/components/schemas/Histogram"
      required:
        - labels
        - scenarioInfo
        - pipelineSummary
        - histogram

    GraphElements:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/Node"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/Edge"
        labels:
          type: array
          items:
            $ref: "#/components/schemas/GraphLabel"
      required:
        - nodes
        - edges
        - labels

    GraphTable:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: { }
      required:
        - data

    Graph:
      type: object
      properties:
        elements:
          $ref: "#/components/schemas/GraphElements"
        metaData:
          $ref: "#/components/schemas/GraphMetaData"
        table:
          $ref: "#/components/schemas/GraphTable"
      required:
        - elements
        - metaData
        - table

    Room:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
        scenario:
          type: object
          nullable: true
          properties:
            current:
              $ref: "#/components/schemas/Scenario"
          required:
            - current
        editUrl:
          type: string
          nullable: true
      required:
        - id
        - title
        - scenario
        - editUrl

    Rooms:
      type: object
      properties:
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/Room"
      required:
        - rooms

    Database:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
        browserUrl:
          type: string
          nullable: true
        editUrl:
          type: string
          nullable: true
        scenarioGroups:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioGroup"
      required:
        - id
        - title
        - url
        - browserUrl
        - editUrl
        - scenarioGroups

    Databases:
      type: object
      properties:
        databases:
          type: array
          items:
            $ref: "#/components/schemas/Database"
      required:
        - databases

    ScenarioGroup:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
        editUrl:
          type: string
          nullable: true
        scenarios:
          type: array
          items:
            $ref: "#/components/schemas/Scenario"
      required:
        - id
        - title
        - editUrl
        - scenarios

    Scenario:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
        query:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        coverUrl:
          type: string
          format: uri
          nullable: true
        editUrl:
          type: string
          nullable: true
      required:
        - id
        - title
        - query
        - description
        - coverUrl
        - editUrl

    Version:
      type: object
      properties:
        version:
          type: string
      required:
        - version

    PhysicsPerformance:
      type: object
      properties:
        performance:
          type: string
          enum: ["good", "bad"]
        loadPercent:
          type: number
        tickDuration:
          type: number
      required:
        - performance
        - loadPercent
        - tickDuration

    WSClientToServerMessage:
      oneOf:
        - $ref: "#/components/schemas/WSActionJoinRoom"
        - $ref: "#/components/schemas/WSActionLeaveRoom"
        - $ref: "#/components/schemas/WSActionLoadScenario"
        - $ref: "#/components/schemas/WSActionGetGraph"
        - $ref: "#/components/schemas/WSActionGrabNode"
        - $ref: "#/components/schemas/WSActionMoveNodes"
        - $ref: "#/components/schemas/WSActionUngrabNode"
        - $ref: "#/components/schemas/WSActionExpandNodes"
        - $ref: "#/components/schemas/WSActionDeleteNodes"
        - $ref: "#/components/schemas/WSActionRelayout"
        - $ref: "#/components/schemas/WSActionUnlockNodes"

    WSServerToClientMessage:
      oneOf:
        - $ref: "#/components/schemas/WSEventNodesMoved"
        - $ref: "#/components/schemas/WSEventRoomChanged"
        - $ref: "#/components/schemas/WSEventNotification"
        - $ref: "#/components/schemas/WSEventGraphChanged"
        - $ref: "#/components/schemas/WSEventProgress"
        - $ref: "#/components/schemas/WSEventClearProgress"
        - $ref: "#/components/schemas/WSEventSetLocks"
        - $ref: "#/components/schemas/WSEventLockUi"
        - $ref: "#/components/schemas/WSEventUnlockUi"
        - $ref: "#/components/schemas/WSEventPerformanceChanged"

    WSActionJoinRoom:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionJoinRoom"]
        roomId:
          type: string
      required:
        - type
        - roomId

    WSActionLeaveRoom:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionLeaveRoom"]
      required:
        - type

    WSActionLoadScenario:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionLoadScenario"]
        scenarioId:
          type: string
      required:
        - type
        - scenarioId

    WSActionGetGraph:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionGetGraph"]
      required:
        - type

    WSActionMoveNodes:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionMoveNodes"]
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/PhysicalNode"
      required:
        - type
        - nodes

    WSActionGrabNode:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionGrabNode"]
        nodeId:
          type: string
      required:
        - type
        - nodeId

    WSActionUngrabNode:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionUngrabNode"]
        node:
          $ref: "#/components/schemas/PhysicalNode"
      required:
        - type
        - node

    WSActionExpandNodes:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionExpandNodes"]
        nodes:
          type: array
          items:
            type: string
      required:
        - type
        - nodes

    WSActionDeleteNodes:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionDeleteNodes"]
        nodes:
          type: array
          items:
            type: string
      required:
        - type
        - nodes

    WSActionRelayout:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionRelayout"]
      required:
        - type

    WSActionUnlockNodes:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionUnlockNodes"]
        nodes:
          type: array
          items:
            type: string
      required:
        - type
        - nodes

    WSEventGraphChanged:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventGraphChanged"]
        graph:
          $ref: "#/components/schemas/Graph"
      required:
        - type
        - graph

    WSEventRoomChanged:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventRoomChanged"]
        roomId:
          type: string
          nullable: true
      required:
        - type
        - roomId

    WSEventNodesMoved:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventNodesMoved"]
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/PhysicalNode"
        date:
          type: string
          format: date
      required:
        - type
        - nodes
        - date

    WSEventNotification:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventNotification"]
        title:
          type: string
        message:
          type: string
        severity:
          type: string
          enum:
            - error
            - message
            - warning
        date:
          type: string
          format: date
      required:
        - type
        - title
        - message
        - severity
        - date

    WSEventProgress:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventProgress"]
        progress:
          type: number
          nullable: true
        message:
          type: string
      required:
        - type
        - progress
        - message

    WSEventClearProgress:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventClearProgress"]
      required:
        - type

    WSEventSetLocks:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventSetLocks"]
        locks:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              locked:
                type: boolean
            required:
              - id
              - locked
      required:
        - type
        - locks

    WSEventLockUi:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventLockUi"]
      required:
        - type

    WSEventUnlockUi:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventUnlockUi"]
      required:
        - type

    WSEventPerformanceChanged:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventPerformanceChanged"]
        performance:
          $ref: "#/components/schemas/PhysicsPerformance"
      required:
        - type
