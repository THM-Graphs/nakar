openapi: 3.0.0
info:
  title: NAKAR
  version: 1.0.0

servers:
  - url: http://localhost:1338
    description: Development
  - url: http://nakar.mni.thm.de:1338
    description: Production

tags:
  - name: Authentication
  - name: Scenarios
  - name: Room
  - name: Graph
  - name: Notes
  - name: Actions
  - name: System
  - name: Database

paths:
  /auth:
    post:
      tags:
        - Authentication
      operationId: postAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
              required:
                - username
                - password
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  jwt:
                    type: string
                  username:
                    type: string
                required:
                  - jwt
                  - username
    get:
      tags:
        - Authentication
      operationId: getAuth
      security:
        - bearerAuth: []
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                required:
                  - username

  /room/{id}/scenarios:
    get:
      tags:
        - Scenarios
      operationId: getScenarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetScenariosResult"

  /room:
    get:
      tags:
        - Room
      operationId: getRooms
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rooms"
  /room/{id}:
    get:
      tags:
        - Room
      operationId: getRoom
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Room"

  /room/{id}/graph:
    get:
      tags:
        - Graph
      operationId: getRoomGraph
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Graph"

  /room/{id}/graph/elements:
    get:
      tags:
        - Graph
      operationId: getRoomGraphElements
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphElements"

  /room/{id}/graph/meta-data:
    get:
      tags:
        - Graph
      operationId: getRoomGraphMetaData
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphMetaData"

  /room/{id}/graph/table:
    get:
      tags:
        - Graph
      operationId: getRoomGraphTable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphTable"

  /room/{id}/notes:
    post:
      tags:
        - Notes
      operationId: postNote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodeIds:
                  type: array
                  items:
                    type: string
                content:
                  type: string
                color:
                  type: object
                  nullable: true
                  properties:
                    color:
                      $ref: "#/components/schemas/Color"
                  required:
                    - color
              required:
                - nodeIds
                - content
                - color
      responses:
        "200":
          description: "OK"

  /room/{id}/note/{noteId}:
    delete:
      tags:
        - Notes
      operationId: deleteNote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: noteId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
    put:
      tags:
        - Notes
      operationId: putNote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: noteId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodeIds:
                  type: array
                  items:
                    type: string
                content:
                  type: string
                color:
                  type: object
                  nullable: true
                  properties:
                    color:
                      $ref: "#/components/schemas/Color"
                  required:
                    - color
              required:
                - nodeIds
                - content
                - color
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/load-scenario:
    post:
      tags:
        - Actions
      operationId: postRoomActionLoadScenario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                scenarioId:
                  type: string
                arguments:
                  type: array
                  items:
                    $ref: "#/components/schemas/ScenarioArgument"
              required:
                - scenarioId
                - arguments
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/reload-scenario:
    post:
      tags:
        - Actions
      operationId: postRoomActionReloadScenario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/expand-node:
    post:
      tags:
        - Actions
      operationId: postRoomActionExpandNode
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodeId:
                  type: string
                limit:
                  type: object
                  properties:
                    labels:
                      type: array
                      items:
                        type: string
                    relationships:
                      type: array
                      items:
                        type: string
                  required:
                    - labels
                    - relationships
              required:
                - nodeId
                - limit
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/expand-node-preview:
    post:
      tags:
        - Actions
      operationId: postRoomActionExpandNodePreview
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodeId:
                  type: string
              required:
                - nodeId
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                type: object
                nullable: true
                properties:
                  relationships:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExpandNodePreviewElement"
                  labels:
                    type: array
                    items:
                      $ref: "#/components/schemas/ExpandNodePreviewElement"
                required:
                  - relationships
                  - labels

  /room/{id}/actions/delete-elements:
    post:
      tags:
        - Actions
      operationId: postRoomActionDeleteElements
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodes:
                  type: array
                  items:
                    type: string
                edges:
                  type: array
                  items:
                    type: string
                labels:
                  type: array
                  items:
                    type: string
                edgeTypes:
                  type: array
                  items:
                    type: string
              required:
                - nodes
                - edges
                - labels
                - edgeTypes
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/relayout:
    post:
      tags:
        - Actions
      operationId: postRoomActionRelayout
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/unlock-nodes:
    post:
      tags:
        - Actions
      operationId: postRoomActionUnlockNodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodes:
                  type: array
                  items:
                    type: string
              required:
                - nodes
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/focus-nodes:
    post:
      tags:
        - Actions
      operationId: postRoomActionFocusNodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nodes:
                  type: array
                  items:
                    type: string
              required:
                - nodes
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/undo:
    post:
      tags:
        - Actions
      operationId: postRoomActionUndo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/redo:
    post:
      tags:
        - Actions
      operationId: postRoomActionRedo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/run-query:
    post:
      tags:
        - Actions
      operationId: postRoomActionRunQuery
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                databaseId:
                  type: string
                query:
                  type: string
                replace:
                  type: boolean
              required:
                - databaseId
                - query
                - replace
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/connect-result-nodes:
    post:
      tags:
        - Actions
      operationId: postRoomActionConnectResultNodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/unlock-all-nodes:
    post:
      tags:
        - Actions
      operationId: postRoomActionUnlockAllNodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/remove-dangling-nodes:
    post:
      tags:
        - Actions
      operationId: postRoomActionRemoveDanglingNodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/compress-relationships:
    post:
      tags:
        - Actions
      operationId: postRoomActionCompressRelationships
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/compress-nodes:
    post:
      tags:
        - Actions
      operationId: postRoomActionCompressNodes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
              required:
                - label
      responses:
        "200":
          description: "OK"

  /room/{id}/actions/layout-label:
    post:
      tags:
        - Actions
      operationId: postRoomActionLayoutLabel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                layoutSpecification:
                  $ref: "#/components/schemas/LayoutSpecification"
              required:
                - label
                - layoutSpecification
      responses:
        "200":
          description: "OK"

  /database/{id}/stats:
    get:
      tags:
        - Database
      operationId: getDatabaseStats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatabaseStats"

  /system/version:
    get:
      tags:
        - System
      operationId: getVersion
      responses:
        "200":
          description: "OK"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Version"

  /system/backup:
    get:
      tags:
        - System
      operationId: getBackup
      responses:
        "200":
          description: "OK"

  /system/import:
    post:
      tags:
        - System
      operationId: postImport
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload.
      responses:
        "200":
          description: "OK"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    GetScenariosResult:
      type: object
      properties:
        scenarioGroups:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioGroup"
        parameterizedScenarios:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioGroup"
        referencedDatabases:
          type: array
          items:
            $ref: "#/components/schemas/Database"
      required:
        - scenarioGroups
        - parameterizedScenarios
        - referencedDatabases

    PresetColorIndex:
      type: integer
      enum: [0, 1, 2, 3, 4, 5]

    PresetColor:
      type: object
      properties:
        type:
          type: string
          enum: ["PresetColor"]
        index:
          $ref: "#/components/schemas/PresetColorIndex"
      required:
        - index
        - type

    CustomColor:
      type: object
      properties:
        type:
          type: string
          enum: ["CustomColor"]
        backgroundColor:
          type: string
        textColor:
          type: string
      required:
        - type
        - backgroundColor
        - textColor

    Color:
      oneOf:
        - $ref: "#/components/schemas/PresetColor"
        - $ref: "#/components/schemas/CustomColor"

    GraphLabel:
      type: object
      properties:
        label:
          type: string
        color:
          $ref: "#/components/schemas/Color"
        count:
          type: integer
        sources:
          type: array
          items:
            type: string
      required:
        - label
        - color
        - count
        - sources

    GraphProperty:
      type: object
      properties:
        slug:
          type: string
        value:
          $ref: "#/components/schemas/GraphPropertyValue"
      required:
        - slug
        - value
    GraphPropertyValue: {}

    CreationReason:
      type: string
      enum: [
        "loadScenario",
        "expand",
        "query",
        "merge",
        "compress",
        "connectResultNodes"
      ]

    Node:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        labels:
          type: array
          items:
            type: string
        nativeLabels:
          type: array
          items:
            type: string
        properties:
          type: array
          items:
            $ref: "#/components/schemas/GraphProperty"
        radius:
          type: number
        position:
          $ref: "#/components/schemas/Position"
        inDegree:
          type: integer
        outDegree:
          type: integer
        degree:
          type: integer
        namesInQuery:
          type: array
          items:
            type: string
        customColor:
          type: object
          nullable: true
          properties:
            color:
              $ref: "#/components/schemas/Color"
          required:
            - color
        customTitleColor:
          type: string
          nullable: true
        source:
          type: string
        locked:
          type: boolean
        isCluster:
          type: boolean
        clusterSize:
          type: integer
        incomingEdges:
          type: array
          items:
            $ref: "#/components/schemas/EdgePreview"
        outgoingEdges:
          type: array
          items:
            $ref: "#/components/schemas/EdgePreview"
        creationReason:
          $ref: "#/components/schemas/CreationReason"
        notes:
          type: array
          items:
            $ref: "#/components/schemas/Note"
      required:
        - id
        - title
        - labels
        - nativeLabels
        - properties
        - radius
        - position
        - inDegree
        - outDegree
        - degree
        - namesInQuery
        - customColor
        - source
        - locked
        - isCluster
        - clusterSize
        - incomingEdges
        - outgoingEdges
        - creationReason
        - notes

    PhysicalNode:
      type: object
      properties:
        id:
          type: string
        position:
          $ref: "#/components/schemas/Position"
      required:
        - id
        - position

    Position:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
      required:
        - x
        - y

    Edge:
      type: object
      properties:
        id:
          type: string
        startNodeId:
          type: string
        endNodeId:
          type: string
        type:
          type: string
        isLoop:
          type: boolean
        parallelCount:
          type: integer
        parallelIndex:
          type: integer
        isCluster:
          type: boolean
        width:
          type: number
        properties:
          type: array
          items:
            $ref: "#/components/schemas/GraphProperty"
        namesInQuery:
          type: array
          items:
            type: string
        source:
          type: string
        clusterSize:
          type: integer
        sourceNode:
          $ref: "#/components/schemas/NodePreview"
        targetNode:
          $ref: "#/components/schemas/NodePreview"
        creationReason:
          $ref: "#/components/schemas/CreationReason"
      required:
        - id
        - startNodeId
        - endNodeId
        - type
        - properties
        - isLoop
        - parallelCount
        - parallelIndex
        - isCluster
        - width
        - namesInQuery
        - source
        - clusterSize
        - sourceNode
        - targetNode
        - creationReason

    NodePreview:
      properties:
        id:
          type: string
        title:
          type: string
        labels:
          type: array
          items:
            type: string
        customColor:
          type: object
          nullable: true
          properties:
            color:
              $ref: "#/components/schemas/Color"
          required:
            - color
      required:
        - id
        - title
        - labels
        - customColor

    EdgePreview:
      properties:
        type:
          type: string
        count:
          type: number
        percentage:
          type: number
      required:
        - type
        - count
        - percentage

    Histogram:
      type: object
      properties:
        nodeLabels:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              count:
                type: number
              percentage:
                type: number
            required:
              - label
              - count
              - percentage
        nodeProperties:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              values:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: string
                    count:
                      type: number
                    percentage:
                      type: number
                  required:
                    - value
                    - count
                    - percentage
            required:
              - key
              - values
        edgeTypes:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              count:
                type: number
              percentage:
                type: number
            required:
              - type
              - count
              - percentage
        edgeProperties:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              values:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: string
                    count:
                      type: number
                    percentage:
                      type: number
                  required:
                    - value
                    - count
                    - percentage
            required:
              - key
              - values
        nodes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              labels:
                type: array
                items:
                  type: string
              degree:
                type: number
              percentage:
                type: number
              customColor:
                type: object
                nullable: true
                properties:
                  color:
                    $ref: "#/components/schemas/Color"
                required:
                  - color
            required:
              - id
              - title
              - labels
              - degree
              - percentage
              - customColor
      required:
        - nodeLabels
        - nodeProperties
        - edgeTypes
        - edgeProperties
        - nodes

    GraphMetaData:
      type: object
      properties:
        scenario:
          type: object
          nullable: true
          properties:
            current:
              $ref: "#/components/schemas/Scenario"
          required:
            - current
        pipelineSummary:
          type: array
          items:
            type: object
            properties:
              step:
                type: string
              durationMs:
                type: number
            required:
              - step
              - durationMs
        arguments:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioArgument"
        canUndo:
          type: boolean
        canRedo:
          type: boolean
      required:
        - scenarioInfo
        - pipelineSummary
        - arguments
        - canUndo
        - canRedo

    GraphElements:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/Node"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/Edge"
        labels:
          type: array
          items:
            $ref: "#/components/schemas/GraphLabel"
        histogram:
          $ref: "#/components/schemas/Histogram"
        notes:
          type: array
          items:
            $ref: "#/components/schemas/Note"
      required:
        - nodes
        - edges
        - labels
        - histogram
        - notes

    GraphTable:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: { }
      required:
        - data

    Graph:
      type: object
      properties:
        elements:
          $ref: "#/components/schemas/GraphElements"
        metaData:
          $ref: "#/components/schemas/GraphMetaData"
        table:
          $ref: "#/components/schemas/GraphTable"
      required:
        - elements
        - metaData
        - table

    Room:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
        scenario:
          type: object
          nullable: true
          properties:
            current:
              $ref: "#/components/schemas/Scenario"
          required:
            - current
        editUrl:
          type: string
          nullable: true
      required:
        - id
        - title
        - scenario
        - editUrl

    Rooms:
