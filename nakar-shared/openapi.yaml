openapi: 3.0.0
info:
  title: NAKAR
  version: 1.0.0

servers:
  - url: http://localhost:1338
    description: Development
  - url: http://nakar.mni.thm.de:1338
    description: Production

tags:
  - name: Authentication
  - name: Start Page
  - name: Project Page
  - name: Canvas Page
  - name: Notes
  - name: Room
  - name: Canvas
  - name: Graph
  - name: Actions
  - name: System
  - name: Database

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    GetScenariosResult:
      type: object
      properties:
        scenarioGroups:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioGroup"
        parameterizedScenarios:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioGroup"
        referencedDatabases:
          type: array
          items:
            $ref: "#/components/schemas/DatabaseConnection"
      required:
        - scenarioGroups
        - parameterizedScenarios
        - referencedDatabases

    PresetColorIndex:
      type: integer
      enum: [0, 1, 2, 3, 4, 5]

    PresetColor:
      type: object
      properties:
        type:
          type: string
          enum: ["PresetColor"]
        index:
          $ref: "#/components/schemas/PresetColorIndex"
      required:
        - index
        - type

    CustomColor:
      type: object
      properties:
        type:
          type: string
          enum: ["CustomColor"]
        backgroundColor:
          type: string
        textColor:
          type: string
      required:
        - type
        - backgroundColor
        - textColor

    Color:
      oneOf:
        - $ref: "#/components/schemas/PresetColor"
        - $ref: "#/components/schemas/CustomColor"

    GraphLabel:
      type: object
      properties:
        label:
          type: string
        color:
          $ref: "#/components/schemas/Color"
        count:
          type: integer
        sources:
          type: array
          items:
            type: string
      required:
        - label
        - color
        - count
        - sources

    GraphProperty:
      type: object
      properties:
        slug:
          type: string
        value:
          $ref: "#/components/schemas/GraphPropertyValue"
      required:
        - slug
        - value
    GraphPropertyValue: {}

    CreationReason:
      type: string
      enum:
        [
          "loadScenario",
          "expand",
          "query",
          "merge",
          "compress",
          "connectResultNodes",
          "search",
        ]

    Node:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        labels:
          type: array
          items:
            type: string
        nativeLabels:
          type: array
          items:
            type: string
        properties:
          type: array
          items:
            $ref: "#/components/schemas/GraphProperty"
        radius:
          type: number
        position:
          $ref: "#/components/schemas/Position"
        inDegree:
          type: integer
        outDegree:
          type: integer
        degree:
          type: integer
        namesInQuery:
          type: array
          items:
            type: string
        customColor:
          type: object
          nullable: true
          properties:
            color:
              $ref: "#/components/schemas/Color"
          required:
            - color
        customTitleColor:
          type: string
          nullable: true
        source:
          type: string
        sourceId:
          type: string
        locked:
          type: boolean
        isCluster:
          type: boolean
        clusterSize:
          type: integer
        incomingEdges:
          type: array
          items:
            $ref: "#/components/schemas/EdgePreview"
        outgoingEdges:
          type: array
          items:
            $ref: "#/components/schemas/EdgePreview"
        creationReason:
          $ref: "#/components/schemas/CreationReason"
        notes:
          type: array
          items:
            $ref: "#/components/schemas/Note"
      required:
        - id
        - title
        - labels
        - nativeLabels
        - properties
        - radius
        - position
        - inDegree
        - outDegree
        - degree
        - namesInQuery
        - customColor
        - source
        - sourceId
        - locked
        - isCluster
        - clusterSize
        - incomingEdges
        - outgoingEdges
        - creationReason
        - notes

    PhysicalNode:
      type: object
      properties:
        id:
          type: string
        position:
          $ref: "#/components/schemas/Position"
      required:
        - id
        - position

    Position:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
      required:
        - x
        - y

    Edge:
      type: object
      properties:
        id:
          type: string
        startNodeId:
          type: string
        endNodeId:
          type: string
        type:
          type: string
        isLoop:
          type: boolean
        parallelCount:
          type: integer
        parallelIndex:
          type: integer
        isCluster:
          type: boolean
        width:
          type: number
        properties:
          type: array
          items:
            $ref: "#/components/schemas/GraphProperty"
        namesInQuery:
          type: array
          items:
            type: string
        source:
          type: string
        clusterSize:
          type: integer
        sourceNode:
          $ref: "#/components/schemas/NodePreview"
        targetNode:
          $ref: "#/components/schemas/NodePreview"
        creationReason:
          $ref: "#/components/schemas/CreationReason"
      required:
        - id
        - startNodeId
        - endNodeId
        - type
        - properties
        - isLoop
        - parallelCount
        - parallelIndex
        - isCluster
        - width
        - namesInQuery
        - source
        - clusterSize
        - sourceNode
        - targetNode
        - creationReason

    NodePreview:
      properties:
        id:
          type: string
        title:
          type: string
        labels:
          type: array
          items:
            type: string
        customColor:
          type: object
          nullable: true
          properties:
            color:
              $ref: "#/components/schemas/Color"
          required:
            - color
      required:
        - id
        - title
        - labels
        - customColor

    EdgePreview:
      properties:
        type:
          type: string
        count:
          type: number
        percentage:
          type: number
      required:
        - type
        - count
        - percentage

    Histogram:
      type: object
      properties:
        nodeLabels:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              count:
                type: number
              percentage:
                type: number
            required:
              - label
              - count
              - percentage
        nodeProperties:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              values:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: string
                    count:
                      type: number
                    percentage:
                      type: number
                  required:
                    - value
                    - count
                    - percentage
            required:
              - key
              - values
        edgeTypes:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              count:
                type: number
              percentage:
                type: number
            required:
              - type
              - count
              - percentage
        edgeProperties:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              values:
                type: array
                items:
                  type: object
                  properties:
                    value:
                      type: string
                    count:
                      type: number
                    percentage:
                      type: number
                  required:
                    - value
                    - count
                    - percentage
            required:
              - key
              - values
        nodes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              labels:
                type: array
                items:
                  type: string
              degree:
                type: number
              percentage:
                type: number
              customColor:
                type: object
                nullable: true
                properties:
                  color:
                    $ref: "#/components/schemas/Color"
                required:
                  - color
            required:
              - id
              - title
              - labels
              - degree
              - percentage
              - customColor
      required:
        - nodeLabels
        - nodeProperties
        - edgeTypes
        - edgeProperties
        - nodes

    GraphMetaData:
      type: object
      properties:
        scenario:
          type: object
          nullable: true
          properties:
            current:
              $ref: "#/components/schemas/Scenario"
          required:
            - current
        arguments:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioArgument"
        undoAction:
          type: string
          nullable: true
        redoAction:
          type: string
          nullable: true
      required:
        - scenarioInfo
        - arguments
        - undoAction
        - redoAction

    GraphElements:
      type: object
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/Node"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/Edge"
        labels:
          type: array
          items:
            $ref: "#/components/schemas/GraphLabel"
        histogram:
          $ref: "#/components/schemas/Histogram"
        notes:
          type: array
          items:
            $ref: "#/components/schemas/Note"
      required:
        - nodes
        - edges
        - labels
        - histogram
        - notes

    GraphTable:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            additionalProperties: {}
      required:
        - data

    Graph:
      type: object
      properties:
        elements:
          $ref: "#/components/schemas/GraphElements"
        metaData:
          $ref: "#/components/schemas/GraphMetaData"
        table:
          $ref: "#/components/schemas/GraphTable"
      required:
        - elements
        - metaData
        - table

    Rooms:
      type: object
      properties:
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/Room"
      required:
        - rooms

    ScenarioQuery:
      type: object
      properties:
        query:
          type: string
        database:
          type: object
          nullable: true
          properties:
            current:
              $ref: "#/components/schemas/DatabaseConnection"
          required:
            - current
      required:
        - query
        - database

    Scenario:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
          nullable: true
        queries:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioQuery"
        description:
          type: string
          nullable: true
        parameters:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioParameter"
        postActions:
          type: array
          items:
            type: string
      required:
        - id
        - title
        - query
        - description
        - parameters
        - queries
        - postActions

    ScenarioParameter:
      type: object
      properties:
        identifier:
          type: string
        title:
          type: string
        defaultValue:
          type: string
          nullable: true
        dataType:
          type: string
          enum: ["string", "number", "json", "startDateTime", "endDateTime"]
      required:
        - identifier
        - title
        - defaultValue
        - dataType

    ScenarioArgument:
      type: object
      properties:
        identifier:
          type: string
        value:
          type: string
      required:
        - identifier
        - value

    Notification:
      type: object
      properties:
        message:
          type: string
        severity:
          type: string
          enum:
            - error
            - message
            - warning
        date:
          type: string
          format: date
      required:
        - message
        - severity
        - date

    PhysicsPerformance:
      type: object
      properties:
        performance:
          type: string
          enum: ["good", "bad"]
        loadPercent:
          type: number
        tickDuration:
          type: number
        tickCount:
          type: number
      required:
        - performance
        - loadPercent
        - tickDuration
        - tickCount

    ExpandNodePreviewElement:
      type: object
      properties:
        identificator:
          type: string
        count:
          type: number
      required:
        - identificator
        - count

    Note:
      type: object
      properties:
        id:
          type: string
        content:
          type: string
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/NodePreview"
        author:
          type: object
          nullable: true
          properties:
            current:
              $ref: "#/components/schemas/User"
          required:
            - current
        dateTime:
          type: string
          format: date-time
        color:
          type: object
          nullable: true
          properties:
            color:
              $ref: "#/components/schemas/Color"
          required:
            - color
      required:
        - id
        - content
        - nodes
        - author
        - dateTime
        - color

    LayoutSpecification:
      oneOf:
        - $ref: "#/components/schemas/LayoutSpecificationForceDirected"
        - $ref: "#/components/schemas/LayoutSpecificationCircle"

    LayoutSpecificationForceDirected:
      type: object
      properties:
        type:
          type: "string"
          enum: ["LayoutSpecificationForceDirected"]
      required:
        - type

    LayoutSpecificationCircle:
      type: object
      properties:
        type:
          type: string
          enum: ["LayoutSpecificationCircle"]
        radius:
          type: number
      required:
        - type
        - radius

    Projects:
      type: object
      properties:
        myProjects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        collaborationProjects:
          type: array
          items:
            $ref: "#/components/schemas/Project"
      required:
        - myProjects
        - collaborationProjects

    Project:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        owner:
          type: object
          nullable: true
          properties:
            current:
              $ref: "#/components/schemas/User"
          required:
            - current
        collaborators:
          type: array
          items:
            $ref: "#/components/schemas/User"
        databases:
          type: array
          items:
            $ref: "#/components/schemas/DatabaseConnection"
        scenarioGroups:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioGroup"
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/Room"
      required:
        - id
        - title
        - owner
        - collaborators
        - databases
        - scenarioGroups
        - rooms

    ProjectRole:
      type: string
      enum: ["owner", "collaborator", "none"]

    User:
      type: object
      properties:
        id:
          type: string
        displayName:
          type: string
      required:
        - id
        - displayName

    DatabaseConnection:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        browserUrl:
          type: string
        connectionUrl:
          type: string
      required:
        - id
        - title
        - browserUrl
        - connectionUrl

    Room:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        visibility:
          $ref: "#/components/schemas/RoomVisibility"
        canvases:
          type: array
          items:
            $ref: "#/components/schemas/Canvas"
        projectTitle:
          type: string
      required:
        - id
        - title
        - visibility
        - canvases
        - projectTitle

    RoomVisibility:
      type: string
      enum: ["private", "public", "unlisted"]

    ScenarioGroup:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        scenarios:
          type: array
          items:
            $ref: "#/components/schemas/Scenario"
      required:
        - id
        - title
        - scenarios

    Canvas:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
      required:
        - id
        - title

    CanvasData:
      type: object
      properties:
        metaData:
          $ref: "#/components/schemas/GraphMetaData"
        elements:
          $ref: "#/components/schemas/GraphElements"
        table:
          $ref: "#/components/schemas/GraphTable"
        viewSettings:
          $ref: "#/components/schemas/CanvasViewSettings"
      required:
        - metaData
        - elements
        - table
        - viewSettings

    ProjectPage:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        owner:
          type: object
          nullable: true
          properties:
            current:
              $ref: "#/components/schemas/User"
          required:
            - current
        collaborators:
          type: array
          items:
            $ref: "#/components/schemas/User"
        databases:
          type: array
          items:
            $ref: "#/components/schemas/DatabaseConnection"
        scenarioGroups:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioGroup"
        rooms:
          type: array
          items:
            $ref: "#/components/schemas/Room"
      required:
        - id
        - title
        - owner
        - collaborators
        - databases
        - scenarioGroups
        - rooms

    CanvasPage:
      type: object
      properties:
        canvas:
          $ref: "#/components/schemas/Canvas"
        scenarios:
          $ref: "#/components/schemas/GetScenariosResult"
        room:
          $ref: "#/components/schemas/Room"
      required:
        - canvas
        - scenarios
        - room

    CanvasViewSettings:
      type: object
      properties:
        compressRelationshipsWidthFactor:
          type: number
        growNodesBasedOnDegree:
          type: boolean
        growNodesBasedOnDegreeFactor:
          type: number
      required:
        - compressRelationshipsWidthFactor
        - growNodesBasedOnDegree
        - growNodesBasedOnDegreeFactor

    WSClientToServerMessage:
      oneOf:
        - $ref: "#/components/schemas/WSActionJoinCanvas"
        - $ref: "#/components/schemas/WSActionLeaveCanvas"
        - $ref: "#/components/schemas/WSActionGrabNode"
        - $ref: "#/components/schemas/WSActionMoveNodes"
        - $ref: "#/components/schemas/WSActionUngrabNode"

    WSServerToClientMessage:
      oneOf:
        - $ref: "#/components/schemas/WSEventNodesMoved"
        - $ref: "#/components/schemas/WSEventCanvasChanged"
        - $ref: "#/components/schemas/WSEventNotification"
        - $ref: "#/components/schemas/WSEventGraphElementsChanged"
        - $ref: "#/components/schemas/WSEventGraphMetaDataChanged"
        - $ref: "#/components/schemas/WSEventGraphTableChanged"
        - $ref: "#/components/schemas/WSEventViewSettingsChanged"
        - $ref: "#/components/schemas/WSEventCanvasDataReady"
        - $ref: "#/components/schemas/WSEventProgress"
        - $ref: "#/components/schemas/WSEventClearProgress"
        - $ref: "#/components/schemas/WSEventSetNodeLocks"
        - $ref: "#/components/schemas/WSEventKick"

    WSActionJoinCanvas:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionJoinCanvas"]
        canvasId:
          type: string
      required:
        - type
        - canvasId

    WSActionLeaveCanvas:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionLeaveCanvas"]
      required:
        - type

    WSActionMoveNodes:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionMoveNodes"]
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/PhysicalNode"
      required:
        - type
        - nodes

    WSActionGrabNode:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionGrabNode"]
        nodeId:
          type: string
      required:
        - type
        - nodeId

    WSActionUngrabNode:
      type: object
      properties:
        type:
          type: string
          enum: ["WSActionUngrabNode"]
        node:
          $ref: "#/components/schemas/PhysicalNode"
      required:
        - type
        - node

    WSEventGraphMetaDataChanged:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventGraphMetaDataChanged"]
        metaData:
          $ref: "#/components/schemas/GraphMetaData"
      required:
        - type
        - metaData

    WSEventGraphElementsChanged:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventGraphElementsChanged"]
        elements:
          $ref: "#/components/schemas/GraphElements"
      required:
        - type
        - elements

    WSEventGraphTableChanged:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventGraphTableChanged"]
        table:
          $ref: "#/components/schemas/GraphTable"
      required:
        - type
        - table

    WSEventViewSettingsChanged:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventViewSettingsChanged"]
        viewSettings:
          $ref: "#/components/schemas/CanvasViewSettings"
      required:
        - type
        - viewSettings

    WSEventCanvasDataReady:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventCanvasDataReady"]
        data:
          $ref: "#/components/schemas/CanvasData"
      required:
        - type
        - data

    WSEventCanvasChanged:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventCanvasChanged"]
        canvasId:
          type: string
          nullable: true
      required:
        - type
        - canvasId

    WSEventNodesMoved:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventNodesMoved"]
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/PhysicalNode"
        date:
          type: string
          format: date
        performance:
          $ref: "#/components/schemas/PhysicsPerformance"
      required:
        - type
        - nodes
        - date
        - performance

    WSEventNotification:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventNotification"]
        notification:
          $ref: "#/components/schemas/Notification"
      required:
        - type
        - notification

    WSEventProgress:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventProgress"]
        progress:
          type: number
          nullable: true
        message:
          type: string
      required:
        - type
        - progress
        - message

    WSEventClearProgress:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventClearProgress"]
      required:
        - type

    WSEventSetNodeLocks:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventSetNodeLocks"]
        locks:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              locked:
                type: boolean
            required:
              - id
              - locked
      required:
        - type
        - locks

    WSEventKick:
      type: object
      properties:
        type:
          type: string
          enum: ["WSEventKick"]
      required:
        - type
